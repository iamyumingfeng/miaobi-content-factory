# ============================================
# 妙笔内容工场 - CNB 云原生构建配置
# ============================================
# 用于 CNB 平台的 CI/CD 配置
# ============================================

# ============================================
# master 分支配置
# ============================================
master:
  # 推送事件
  push:
    - name: build-and-test
      stages:
        - name: backend-lint
          script: |
            cd platform_api
            echo "Running backend lint checks..."
            # 简化版本：尝试 python3 然后 python，都失败则跳过
            PYTHON_CMD=""
            if command -v python3 &> /dev/null; then
              PYTHON_CMD=python3
            elif command -v python &> /dev/null; then
              PYTHON_CMD=python
            fi
            if [ -z "$PYTHON_CMD" ]; then
              echo "Python not available, skipping lint"
              exit 0
            fi
            $PYTHON_CMD -m pip install --upgrade pip || true
            $PYTHON_CMD -m pip install flake8 black isort || true
            $PYTHON_CMD -m black --check app/ --diff || true
            $PYTHON_CMD -m isort --check app/ --diff || true
            $PYTHON_CMD -m flake8 app/ --max-line-length=100 --exclude=app/alembic/ || true
          condition: always

        - name: frontend-build
          script: |
            cd platform_web
            echo "Running frontend build..."
            npm install
            npm run build
          condition: always

  # PR 事件
  pull_request:
    - name: pr-checks
      stages:
        - name: lint-check
          script: |
            echo "Running PR lint checks..."
            cd platform_api
            PYTHON_CMD=""
            if command -v python3 &> /dev/null; then
              PYTHON_CMD=python3
            elif command -v python &> /dev/null; then
              PYTHON_CMD=python
            fi
            if [ -z "$PYTHON_CMD" ]; then
              echo "Python not available, skipping lint"
              exit 0
            fi
            $PYTHON_CMD -m pip install --upgrade pip || true
            $PYTHON_CMD -m pip install flake8 black isort || true
            $PYTHON_CMD -m black --check app/ --diff || true
            $PYTHON_CMD -m isort --check app/ --diff || true
            $PYTHON_CMD -m flake8 app/ --max-line-length=100 --exclude=app/alembic/ || true

        - name: frontend-build
          script: |
            cd platform_web
            echo "Running frontend build..."
            npm install
            npm run build

# ============================================
# develop 分支配置
# ============================================
develop:
  push:
    - name: develop-build
      stages:
        - name: quick-check
          script: |
            echo "Quick check on develop branch..."
            cd platform_web
            npm install
            npm run build
          condition: always

# ============================================
# 失败处理
# ============================================
failStages:
  - name: notify-failure
    script: |
      echo "Build failed! Please check the logs for details."
