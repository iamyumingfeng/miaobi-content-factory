# CNB 项目配置文件
# 用于腾讯云 CNB 平台的项目配置

# 项目基本信息
project:
  name: miaobi-content-factory
  description: 妙笔内容工场 - AI 内容生成 SaaS 平台
  version: 1.0.0
  license: MIT

# 构建配置
build:
  backend:
    language: python
    version: "3.11"
    requirements: platform_api/requirements.txt
    test_command: pytest platform_api/
  
  frontend:
    language: node
    version: "18"
    package_manager: npm
    build_command: npm run build
    output_dir: platform_web/dist

# 部署配置
deploy:
  environments:
    - name: development
      branch: develop
      auto_deploy: true
    
    - name: production
      branch: master
      auto_deploy: false
      require_approval: true

# 服务依赖
services:
  mysql:
    version: "8.0"
    database: aigc_platform
  
  redis:
    version: "7.0"
  
  celery:
    workers: 4

# 监控配置
monitoring:
  enabled: true
  metrics:
    - cpu_usage
    - memory_usage
    - request_count
    - error_rate

# 安全配置
security:
  vulnerability_scan: true
  license_check: true
  code_analysis: true