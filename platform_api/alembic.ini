# Miaobi Content Factory - Alembic 配置文件
# 数据库迁移配置

[alembic]
# 迁移脚本路径
script_location = alembic

# 文件模板
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 日志配置
sqlalchemy.url = mysql+pymysql://root:password@localhost:3306/aigc_platform


[post_write_hooks]
# 迁移生成后的钩子
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88


[loggers]
keys = root,sqlalchemy,alembic


[handlers]
keys = console


[formatters]
keys = generic


[logger_root]
level = WARN
handlers = console
qualname =


[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine


[logger_alembic]
level = INFO
handlers =
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
