super_admin:
  userid: ${INITIAL_SUPER_ADMIN_USERID:-}
  password: ${INITIAL_SUPER_ADMIN_PASSWORD:-}
  nickname: ${INITIAL_SUPER_ADMIN_NICKNAME:-}
  display_name: 系统管理员

# 爆款类型配置（20种）
viral_types:
  - value: seeding
    label: 种草安利型
    description: 强调产品优点和使用体验，激发购买欲望
    keywords: [推荐, 安利, 必入, 真香]
  - value: review
    label: 测评对比型
    description: 多产品横向对比，提供选购建议
    keywords: [测评, 对比, 横评, 选哪个]
  - value: tutorial
    label: 教程攻略型
    description: 详细的使用教程和操作指南
    keywords: [教程, 攻略, 怎么用, 新手必看]
  - value: sharing
    label: 好物分享型
    description: 真实的使用感受分享，像朋友聊天
    keywords: [分享, 用后感, 真实体验]
  - value: pain_point
    label: 痛点解决方案
    description: 针对具体问题提供解决方案
    keywords: [痛点, 解决, 救星, 必备]
  - value: story
    label: 故事叙述型
    description: 通过故事串联产品使用场景
    keywords: [故事, 经历, 从前, 后来]
  - value: lifestyle
    label: 生活场景型
    description: 展示产品融入日常生活的方式
    keywords: [日常, 生活, 习惯, 每天用]
  - value: before_after
    label: 前后对比型
    description: 使用前后的效果对比展示
    keywords: [对比, 使用前, 使用后, 变化]
  - value: unboxing
    label: 开箱体验型
    description: 展示产品开箱和初次使用体验
    keywords: [开箱, 到了, 第一眼, 拆箱]
  - value: faq
    label: 答疑解惑型
    description: 解答用户常见疑问和顾虑
    keywords: [疑问, 解答, 常见问题, 一次说清]
  - value: daily
    label: 日常记录型
    description: 记录日常生活中的产品使用
    keywords: [日常, 记录, vlog, 日常碎片]
  - value: collection
    label: 合集盘点型
    description: 多款产品的合集推荐和盘点
    keywords: [合集, 盘点, 清单, 一次说全]
  - value: hidden_gem
    label: 宝藏发现型
    description: 分享被低估或小众的好物
    keywords: [宝藏, 小众, 意外发现, 冷门]
  - value: guide
    label: 新手指南型
    description: 面向新手的入门指南
    keywords: [新手, 入门, 指南, 必看]
  - value: transform
    label: 改造焕新型
    description: 展示改造前后的变化
    keywords: [改造, 焕新, 变身, 翻新]
  - value: hack
    label: 小妙招型
    description: 分享实用的使用技巧和妙招
    keywords: [妙招, 技巧, 小窍门, 隐藏功能]
  - value: wishlist
    label: 许愿清单型
    description: 分享想要购买的产品清单
    keywords: [许愿, 清单, 想要]
  - value: comparison
    label: 横评选购型
    description: 同类产品对比帮助用户选购
    keywords: [选购, 横评, 对比, 哪个好]
  - value: diary
    label: 日记打卡型
    description: 记录使用过程的打卡日记
    keywords: [日记, 打卡, 记录, 坚持]
  - value: trend
    label: 热门趋势型
    description: 分享当下热门流行产品
    keywords: [热门, 趋势, 流行, 当下较火]

