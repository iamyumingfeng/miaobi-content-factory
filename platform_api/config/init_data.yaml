                description: 原创内容素材
                color: '#67C23A'
                is_system: false
    # 用户标签
    user_tags:
      - name: 美妆达人
        tag_type: subuser_tag
        description: 美妆类内容创作者
        color: '#F56C6C'
      - name: 美食博主
        tag_type: subuser_tag
        description: 美食类内容创作者
        color: '#E6A23C'
      - name: 旅行博主
        tag_type: subuser_tag
        description: 旅行类内容创作者
        color: '#409EFF'
    # 创意种子库 - 系统预置种子
    creative_seeds:
      # 开头模式种子
      - name: 反常识开头
        seed_type: opening
        template:
          - "没想到这个xxx居然..."
          - "谁能想到xxx竟然..."
          - "完全没想到xxx会这样..."
          - "这个xxx颠覆了我的认知..."
        description: 用反直觉的事实或结果作为开头，制造好奇缺口
        forbidden_patterns:
          - "震惊！"
          - "不敢相信！"
        example_phrases:
          - "没想到这个几十块的小东西居然这么好用"
          - "没想到这么简单的方法居然没人说过"
          - "谁能想到便宜货竟然比大牌还好用"
          - "完全没想到这个会改变我的习惯"
          - "这个用法颠覆了我的认知"
          - "没想到看起来这么普通，用起来这么惊艳"
          - "谁能想到这么小的东西能量这么大"
        avoid_phrases:
          - "震惊体"
          - "夸张感叹"
          - "标题党"
          - "无脑吹捧"
        category: 通用
        status: enabled
        is_system: true
      - name: 自嘲开头
        seed_type: opening
