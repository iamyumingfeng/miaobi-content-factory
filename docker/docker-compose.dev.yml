  #   command: celery -A app.tasks.celery_app flower --port=5555
  #   ports:
  #     - "${FLOWER_PORT:-5555}:5555"
  #   networks:
  #     - miaobi-aigc-factory-network
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:5555/"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 10s
  #   profiles:
  #     - optional

  # ========================================
