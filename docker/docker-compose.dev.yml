  #     mysql:
  #       condition: service_healthy
  #   environment:
  #     - PMA_HOST=mysql
  #     - PMA_PORT=3306
  #     - PMA_USER=${MYSQL_USER:-aigc_user}
  #     - PMA_PASSWORD=${MYSQL_PASSWORD:-aigc_password123}
  #     - TZ=Asia/Shanghai
  #   ports:
  #     - "${PHPMYADMIN_PORT:-8081}:80"
  #   networks:
  #     - miaobi-aigc-factory-network
